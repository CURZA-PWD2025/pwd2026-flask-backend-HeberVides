services:
  backend:
    build: backend
    container_name: flask_api_stock
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    networks:
      - stock_network

  db:
    image: postgres:15
    container_name: postgres_stock
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - stock_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_stock
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - stock_network 

volumes:
  pgdata:
  pgadmin_data:

networks:
  stock_network:
    driver: bridge
